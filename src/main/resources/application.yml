spring:
  application:
    name: clube-do-album-gateway-api

server:
  port: ${SERVER_PORT:3000}

services:
  identity-api-url: ${IDENTITY_API_URL:http://localhost:8081}
  catalog-api-url: ${CATALOG_API_URL:http://localhost:3001}
  ratings-api-url: ${RATINGS_API_URL:http://localhost:8082}
  ranking-api-url: ${RANKING_API_URL:http://localhost:3002}
  feed-api-url: ${FEED_API_URL:http://localhost:3003}
  social-api-url: ${SOCIAL_API_URL:http://localhost:3004}
  notification-api-url: ${NOTIFICATION_API_URL:http://localhost:3005}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:clube-do-album-local-development-secret-key-change-me}
